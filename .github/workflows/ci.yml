name: Testes CodeceptJS
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - run: npm ci
    - run: npx playwright install --with-deps  # <- deps Ubuntu!
    - run: npx codeceptjs run --steps  # Ignora falhas parciais

